<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>स्वयं स्वस्थ बनो अभियान</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Hind+Vadodara:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #0a1f33;
            --accent-red: #d93036;
            --white: #ffffff;
        }
        html, body { 
            font-family: 'Poppins', 'Hind Vadodara', sans-serif; 
            margin: 0; 
            background-color: var(--primary-dark); 
            color: var(--white); 
            scrollbar-width: none; 
            -ms-overflow-style: none; 
            overflow-x: hidden; /* Prevent horizontal scroll */
        }
        html::-webkit-scrollbar, body::-webkit-scrollbar {
            display: none; 
        }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: var(--white); color: #333; }
        .brand-name { font-family: 'Hind Vadodara', sans-serif; font-weight: 700; font-size: 1.4rem; color: #000; }
        .get-started { background: #d93036; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: 600; font-family: 'Poppins', sans-serif; }
        .hero { padding: 20px; text-align: center; }
        .badge { background: #1c3d5a; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 10px; display: inline-block; }
        h1 { margin: 10px 0; font-size: 1.8rem; }
        .highlight { color: var(--accent-red); }
        .title-animate {
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        
        /* Carousel Styles */
        .carousel-container { position: relative; width: 100%; height: 350px; margin: 20px 0; border-radius: 15px; overflow: hidden; background: #333; perspective: 1000px; }
        .slide { 
            position: absolute; width: 100%; height: 100%; 
            transition: transform 0.8s ease-in-out, opacity 0.8s ease-in-out; 
            backface-visibility: hidden;
            opacity: 0;
            transform: rotateY(-90deg);
            transform-origin: left;
        }
        .slide.active { opacity: 1; transform: rotateY(0deg); }
        .slide img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 8px 12px; border-radius: 5px; text-align: center; font-weight: 600; cursor: pointer; border: none; text-decoration: none; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; }
        .btn-red { background: var(--accent-red); color: white; }
        .btn-outline { border: 1px solid #d93036; color: #d93036; background: transparent; }
    </style>
</head>
<body>
    <header>
        <div class="brand-name">स्वयं स्वस्थ बनो अभियान</div>
        <a href="login.html" class="get-started">Get Started</a>
        <div>☰</div>
    </header>

    <div class="hero">
        <div class="badge">गीता दीदी और दीपक भैया की पहल</div>
        <h1><span class="title-animate"><span style="color:white">बारोट वैली की</span> <span style="color:var(--accent-red)">यादें</span></span></h1>
        
        <div class="carousel-container" id="carousel">
            <div class="slide active"><img src="images/carousel_picnic.jpg" alt="Outdoor Picnic"></div>
            <div class="slide"><img src="images/carousel_chick.jpg" alt="Barot Valley Chick"></div>
            <div class="slide"><img src="images/carousel_couple.jpg" alt="Elderly Couple on Porch"></div>
            <div class="slide"><img src="images/carousel_landscape.jpg" alt="Mountain Valley Landscape"></div>
            <div class="slide"><img src="images/carousel_village.jpg" alt="Mountain Village Path"></div>
        </div>

        <p style="color: white; font-family: 'Poppins', sans-serif; font-size: 1.1rem; line-height: 1.6;">
            <span style="color: white;">जियेंगे भाई जियेंगे मौज मस्ती से जियेंगे,</span>
            <span style="color: #d93036;">बारोट वैली में ख़ुद से मिलेंगे</span>
        </p>

        <div class="btn-group">
            <a href="gallery.html" class="btn btn-red">More Barot Valley Pics ></a>
            <a href="yoga-calendar.html" class="btn btn-outline">Upcoming Yoga Shivir</a>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 4000);
    </script>
</body>
</html>
