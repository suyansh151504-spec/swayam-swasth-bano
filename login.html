<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - स्वयं स्वस्थ बनो अभियान</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Hind+Vadodara:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', 'Hind Vadodara', sans-serif;
            background-color: #0a1f33;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: #1c3d5a;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 { margin-bottom: 20px; font-family: 'Hind Vadodara', sans-serif; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #d93036;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        a { color: #ccc; text-decoration: none; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>प्रवेश करें</h2>
        <input type="text" placeholder="उपयोगकर्ता नाम (Username)">
        <input type="password" placeholder="पासवर्ड (Password)">
        <button>Login</button>
        <a href="index.html">← वापस होम पेज पर</a>
    </div>
</body>
</html>
