<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>योग शिविर कैलेंडर</title>
    <style>
        body { background-color: #0a1f33; color: white; font-family: 'Poppins', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .top-nav { width: 100%; max-width: 500px; display: flex; justify-content: flex-start; align-items: center; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; width: 100%; max-width: 500px; background: #1c3d5a; padding: 15px; border-radius: 10px; }
        .day { aspect-ratio: 1; display: flex; justify-content: center; align-items: center; background: #0a1f33; border-radius: 5px; }
        .day.booked { background: #d93036; color: white; font-weight: bold; }
        .event-card { background: #1c3d5a; padding: 15px; border-radius: 10px; margin-top: 20px; width: 100%; max-width: 400px; border-left: 5px solid #d93036; }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="index.html" style="color:#d93036; text-decoration:none; font-size: 1.1rem;">← होम</a>
    </div>
    
    <h2>मई 2026</h2>
    <div class="calendar-grid" id="calendar"></div>

    <div id="event-list" style="margin-top:20px; width:100%; max-width:400px;">
        <h3>आगामी शिविर:</h3>
        <div class="event-card">
            <strong>10 मई 2026</strong><br>
            स्थान: गुजरात<br>
            अवधि: शिविर
        </div>
        <div class="event-card">
            <strong>15 मई 2026</strong><br>
            स्थान: अहमदाबाद, गुजरात<br>
            अवधि: 10 दिन
        </div>
    </div>

    <script>
        const calendar = document.getElementById('calendar');
        for (let i = 1; i <= 31; i++) {
            const day = document.createElement('div');
            day.className = 'day' + ((i === 10 || i === 15) ? ' booked' : '');
            day.innerText = i;
            calendar.appendChild(day);
        }
    </script>
</body>
</html>
